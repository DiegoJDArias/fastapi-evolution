version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: postgres_container_v3
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v3:/var/lib/postgresql/data
  web:
    build: .
    container_name: fastapi_postgres_app_v3
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
volumes:
  postgres_data_v3:
